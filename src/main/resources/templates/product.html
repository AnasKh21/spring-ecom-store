<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title th:text="${p.title}">Produit</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <a th:href="@{/}" class="logo">STORE</a>
      <nav class="nav-links">
        <a th:href="@{/categories}">Catégories</a>
      </nav>
    </header>

    <div class="breadcrumbs">
      <a th:href="@{/}">Accueil</a> /
      <a th:href="@{/categories}">Catégories</a> /
      <a th:href="@{/categories/{cat}(cat=${p.category})}" th:text="${p.category}">Catégorie</a> /
      <span th:text="${p.title}">Produit</span>
    </div>

    <main class="product-detail">
      <section class="product-detail-image">
        <img th:if="${p.image}" th:src="${p.image}" th:alt="${p.title}">
        <span th:if="${p.image == null}">Pas d’image disponible</span>
      </section>

      <section class="product-detail-info">
        <span class="badge" th:text="${p.category}">Catégorie</span>
        <h1 class="product-detail-title" th:text="${p.title}">Nom du produit</h1>
        
        <div class="rating" th:if="${p.rating != null}">
          <span th:each="i : ${#numbers.sequence(1,5)}"
                th:text="${i <= T(java.lang.Math).round(p.rating.rate)} ? '★' : '☆'">★</span>
          <span class="muted-text" th:text="'(' + ${p.rating.count} + ' avis)'"></span>
        </div>

        <div class="product-detail-price" th:text="${#numbers.formatDecimal(p.price,1,2)} + ' €'">0,00 €</div>

        <div style="margin-top: 1rem;">
          <h3>Description</h3>
          <p class="product-detail-description" th:text="${p.description}">
            Description du produit…
          </p>
        </div>

        <div class="product-actions">
          <a th:href="@{/buy/{id}(id=${p.id})}" class="btn btn-buy">
            Acheter maintenant
          </a>
          <button type="button" class="btn btn-outline">
            Ajouter au panier
          </button>
        </div>
        
        <p class="muted-text" style="font-size: 0.75rem; margin-top: 1rem;">
          Expédition gratuite sur toutes les commandes. Retours sous 30 jours.
        </p>
      </section>
    </main>
  </div>
</body>
</html>
