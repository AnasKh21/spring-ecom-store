<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title th:text="'Catégories (' + ${#lists.size(categories)} + ')'">Catégories</title>

  <style>
    :root{
      --bg:#020617; --panel:#020617; --muted:#94a3b8; --text:#e2e8f0; --accent:#6366f1;
      --chip:#020617; --chip-br:#1f2937; --ring:rgba(99,102,241,.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top,#111827,#020617);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:950px;margin:0 auto;padding:24px}
    header{display:flex;align-items:center;gap:12px;justify-content:space-between;margin-bottom:16px}
    .title{font-size:1.6rem;font-weight:700;letter-spacing:.2px}
    .muted{color:var(--muted)}
    .actions{display:flex;gap:8px;align-items:center}
    .btn{border:1px solid var(--chip-br);background:var(--chip);padding:8px 12px;border-radius:999px;font-size:.85rem}
    .btn:hover{border-color:#3b82f6}
    .panel{background:var(--panel);border:1px solid #1f2937;border-radius:16px;padding:18px}
    .search{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .search input{
      width:100%; padding:10px 12px; border-radius:999px; border:1px solid var(--chip-br);
      background:#020617; color:var(--text);
      outline:none; box-shadow:0 0 0 0 var(--ring); transition: box-shadow .15s ease, border-color .15s ease;
    }
    .search input:focus{border-color:var(--accent); box-shadow:0 0 0 4px var(--ring)}
    .grid{display:grid;grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px}
    @media (max-width:720px){ .grid{grid-template-columns:1fr} }

    .chip{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 14px;border-radius:12px;border:1px solid var(--chip-br);background:var(--chip);
      transition:transform .08s ease, border-color .15s ease, background .15s ease;
      font-size:.95rem;
    }
    .chip:hover{transform:translateY(-1px); border-color:#3b82f6; background:#020617}
    .chip .left{display:flex;align-items:center;gap:10px}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:22px; height:22px; font-size:.8rem; color:#cbd5e1;
      background:#020617;border:1px solid var(--chip-br); border-radius:999px; padding:0 8px;
    }
    .empty{padding:40px;text-align:center;color:var(--muted)}
    .back{margin-top:18px; display:inline-block;font-size:.9rem}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="title">Catégories</div>
        <div class="muted" th:text="${#lists.size(categories)} + ' au total'">0 au total</div>
      </div>
      <div class="actions">
        <a class="btn" th:href="@{/}">← Accueil</a>
      </div>
    </header>

    <div class="panel">
      <!-- Barre de recherche côté client -->
      <div class="search">
        <input id="q" type="search" placeholder="Rechercher une catégorie…" autocomplete="off" />
      </div>

      <div class="empty" th:if="${#lists.isEmpty(categories)}">
        Aucune catégorie disponible pour le moment.
      </div>

      <div id="cats" class="grid" th:if="${!#lists.isEmpty(categories)}">
        <a class="chip"
           th:each="c : ${categories}"
           th:href="@{/categories/{cat}(cat=${c})}"
           th:attr="data-name=${c}">
          <div class="left">
            <span aria-hidden="true">📦</span>
            <strong th:text="${c}">category</strong>
          </div>
          <span class="badge">Voir produits</span>
        </a>
      </div>
    </div>

    <a class="back" th:href="@{/}">← Retour à l’accueil</a>
  </div>

  <script>
    const input = document.getElementById('q');
    const items = Array.from(document.querySelectorAll('#cats .chip'));
    function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,''); }
    function applyFilter(){
      const q = norm(input.value);
      for (const el of items){
        const name = norm(el.getAttribute('data-name'));
        el.style.display = !q || name.includes(q) ? '' : 'none';
      }
    }
    input?.addEventListener('input', applyFilter);
  </script>
</body>
</html>
