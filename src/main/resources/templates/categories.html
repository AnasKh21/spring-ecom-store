<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catégories</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <a th:href="@{/}" class="logo">STORE</a>
      <nav class="nav-links">
        <a th:href="@{/categories}">Catégories</a>
      </nav>
    </header>

    <main>
      <div style="margin-bottom: 2rem;">
        <h1>Toutes les Catégories</h1>
        <p class="muted-text" th:text="${#lists.size(categories)} + ' catégories disponibles'"></p>
      </div>

      <div class="categories-grid">
        <a th:each="c : ${categories}" th:href="@{/categories/{cat}(cat=${c})}" class="category-card">
          <span style="font-size: 1.5rem; display: block; margin-bottom: 0.5rem;">📦</span>
          <span th:text="${c}">Catégorie</span>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
