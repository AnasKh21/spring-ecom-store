<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title th:text="${category}">Produits</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <a th:href="@{/}" class="logo">STORE</a>
      <nav class="nav-links">
        <a th:href="@{/categories}">Catégories</a>
      </nav>
    </header>

    <div class="breadcrumbs">
      <a th:href="@{/}">Accueil</a> /
      <a th:href="@{/categories}">Catégories</a> /
      <span th:text="${category}">Catégorie</span>
    </div>

    <main>
      <div style="margin-bottom: 2rem;">
        <h1 th:text="${category}">Catégorie</h1>
        <p class="muted-text" th:text="${#lists.size(produits)} + ' produits trouvés'"></p>
      </div>

      <div class="grid">
        <div class="product-card" th:each="p : ${produits}">
          <a th:href="@{/product/{id}(id=${p.id})}" class="product-image-wrapper">
            <img th:if="${p.image}" th:src="${p.image}" th:alt="${p.title}" />
          </a>
          <div class="product-info">
            <span class="product-category" th:text="${p.category}">Catégorie</span>
            <a th:href="@{/product/{id}(id=${p.id})}" class="product-title" th:text="${p.title}">Titre du produit</a>
            <div class="product-footer">
              <span class="product-price" th:text="${#numbers.formatDecimal(p.price,1,2)} + ' €'">0,00 €</span>
              <a th:href="@{/buy/{id}(id=${p.id})}" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.75rem;">Achat Rapide</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
