<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title th:text="${storeName}">Minimal Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <a th:href="@{/}" class="logo" th:text="${storeName}">STORE</a>
      <nav class="nav-links">
        <a th:href="@{/categories}">Catégories</a>
      </nav>
    </header>

    <main>
      <section>
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2rem;">
          <h1>Nos Produits</h1>
          <span class="muted-text" th:text="${#lists.size(produits)} + ' produits'"></span>
        </div>

        <div class="grid">
          <div class="product-card" th:each="p : ${produits}">
            <a th:href="@{/product/{id}(id=${p.id})}" class="product-image-wrapper">
              <img th:if="${p.image}" th:src="${p.image}" th:alt="${p.title}" />
            </a>
            <div class="product-info">
              <span class="product-category" th:text="${p.category}">Catégorie</span>
              <a th:href="@{/product/{id}(id=${p.id})}" class="product-title" th:text="${p.title}">Titre du produit</a>
              <div class="product-footer">
                <span class="product-price" th:text="${#numbers.formatDecimal(p.price,1,2)} + ' €'">0,00 €</span>
                <a th:href="@{/buy/{id}(id=${p.id})}" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.75rem;">Achat Rapide</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
